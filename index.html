<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CanLite Proxy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Access CanLite for a secure, free web unbl0cker and an extensive collection of unbl0cked gam3s for school. Enjoy fast, anonymous access to popular games and websites.">
  <link rel="icon" href="/logo.svg">
  <link rel="canonical" href="https://canlite.org">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script defer src="/uv/uv.bundle.js"></script>
  <script defer src="/uv/uv.config.js"></script>
  <script defer src="/partner.js"></script>
  <script async defer data-domain="trueanalytics.online" src="https://trueanalyticz.online/js/script.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16773478205"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-16773478205');
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const canonical = document.querySelector("link[rel='canonical']");
      if (canonical) {
        canonical.href = `https://canlite.org${location.pathname}${location.search}`;
      }

      if (localStorage.getItem('token')) {
        window.addEventListener("storage", () => {
          const { token, ...rest } = localStorage;
          fetch(`https://${location.hostname}/api/saveGameData`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, localStorageData: rest })
          }).then(res => res.json())
            .then(data => console.log("LocalStorage saved:", data))
            .catch(err => console.error("Save failed:", err));
        });
      }

      if (!Array.from(document.scripts).some(s => s.src.includes('uv.bundle.js'))) {
        alert('Script not imported, proxy will not work. Please join the discord for other links.');
      }
    });

    window.onload = () => {
      navigator.serviceWorker.register("/uv/sw.js", {
        scope: window.__uv$config?.prefix || "/uv/"
      }).catch(err => console.error("Service worker registration failed:", err));
    };
  </script>
  <script async type='text/javascript' src='/api/ad' defer></script>
</body>
</html>
