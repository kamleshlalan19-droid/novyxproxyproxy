<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Novyx Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Access Novyx Network to have fun.">
  <link rel="icon" href="/logo.svg">
  <link rel="canonical" href="https://canlite.org">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <script defer src="/uv/uv.bundle.js"></script>
  <script defer src="/uv/uv.config.js"></script>
  <script defer src="/partner.js"></script>
  <script async defer data-domain="trueanalytics.online" src="https://trueanalyticz.online/js/script.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16773478205"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-16773478205');
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const updateVersion = "2026-05-uv-return";
      const dismissedVersionKey = "dismissedUpdateNoticeVersion";

      const canonical = document.querySelector("link[rel='canonical']");
      if (canonical) {
        canonical.href = `https://canlite.org${location.pathname}${location.search}`;
      }

      if (localStorage.getItem(dismissedVersionKey) !== updateVersion) {
        const notifier = document.createElement("div");
        notifier.innerHTML = `
          <div id="updateNotice" role="status" aria-live="polite">
            <button id="updateNoticeClose" type="button" aria-label="Dismiss update notice">x</button>
            <div class="update-notice-label">Update</div>
            <div class="update-notice-copy">
              Ads are back. You can buy ad-free in the Account Store, and we switched back to the old, faster proxy backend.
            </div>
          </div>
        `;

        const style = document.createElement("style");
        style.innerHTML = `
          #updateNotice {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 999999;
            max-width: 340px;
            padding: 16px 18px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            background: rgba(20, 20, 20, 0.96);
            color: #fff;
            box-shadow: 0 10px 28px rgba(0,0,0,0.4);
            font-family: Arial, sans-serif;
            line-height: 1.45;
          }

          #updateNoticeClose {
            position: absolute;
            top: 8px;
            right: 8px;
            border: 0;
            background: transparent;
            color: rgba(255,255,255,0.72);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
          }

          #updateNoticeClose:hover {
            color: #fff;
          }

          .update-notice-label {
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8fd3ff;
          }

          .update-notice-copy {
            padding-right: 20px;
            font-size: 15px;
          }
        `;

        document.head.appendChild(style);
        document.body.appendChild(notifier);

        document.getElementById("updateNoticeClose").onclick = () => {
          localStorage.setItem(dismissedVersionKey, updateVersion);
          notifier.remove();
        };
      }

      if (localStorage.getItem("token")) {
        const storageApi = Storage.prototype;
        const originalSetItem = storageApi.setItem;
        const originalRemoveItem = storageApi.removeItem;
        const originalClear = storageApi.clear;
        const syncDelayMs = 900;
        let syncTimer = null;
        let lastSavedPayload = "";
        let syncInFlight = false;
        let syncQueued = false;

        const getStoragePayload = () => {
          const token = localStorage.getItem("token");
          if (!token) {
            return null;
          }

          const localStorageData = {};
          for (let index = 0; index < localStorage.length; index += 1) {
            const key = localStorage.key(index);
            if (!key || key === "token") {
              continue;
            }
            localStorageData[key] = localStorage.getItem(key);
          }

          return { token, localStorageData };
        };

        const flushStorageSync = async () => {
          syncTimer = null;
          if (syncInFlight) {
            syncQueued = true;
            return;
          }

          const payload = getStoragePayload();
          if (!payload) {
            lastSavedPayload = "";
            return;
          }

          const serializedPayload = JSON.stringify(payload.localStorageData);
          if (serializedPayload === lastSavedPayload) {
            return;
          }

          syncInFlight = true;
          try {
            const response = await fetch(`https://${location.hostname}/api/saveGameData`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              throw new Error(`Sync failed with status ${response.status}`);
            }

            lastSavedPayload = serializedPayload;
          } catch (err) {
            console.error("Save failed:", err);
          } finally {
            syncInFlight = false;
            if (syncQueued) {
              syncQueued = false;
              scheduleStorageSync();
            }
          }
        };

        function scheduleStorageSync(forceImmediate = false) {
          if (!localStorage.getItem("token")) {
            return;
          }

          if (syncTimer) {
            clearTimeout(syncTimer);
          }

          if (forceImmediate) {
            flushStorageSync();
            return;
          }

          syncTimer = window.setTimeout(flushStorageSync, syncDelayMs);
        }

        storageApi.setItem = function(key, value) {
          originalSetItem.call(this, key, value);
          if (this === localStorage) {
            scheduleStorageSync();
          }
        };

        storageApi.removeItem = function(key) {
          originalRemoveItem.call(this, key);
          if (this === localStorage) {
            scheduleStorageSync();
          }
        };

        storageApi.clear = function() {
          originalClear.call(this);
          if (this === localStorage) {
            scheduleStorageSync();
          }
        };

        window.addEventListener("storage", () => {
          scheduleStorageSync();
        });

        window.addEventListener("pagehide", () => {
          scheduleStorageSync(true);
        });

        lastSavedPayload = JSON.stringify(getStoragePayload()?.localStorageData || {});
      }

      if (!Array.from(document.scripts).some(s => s.src.includes('uv.bundle.js'))) {
        alert('Script not imported, proxy will not work. Please join the discord for other links.');
      }
    });

    window.onload = () => {
      navigator.serviceWorker.register("/uv/sw.js", {
        scope: window.__uv$config?.prefix || "/uv/"
      }).catch(err => console.error("Service worker registration failed:", err));
    };
  </script>
  <script async type='text/javascript' src='/api/ad' defer></script>
</body>
</html>
